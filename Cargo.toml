[package]
name = "libiso"
version = "0.0.8"
edition = "2024"

[lib]
name = "_libiso"
crate-type = ["cdylib"]


[dependencies]
sysinfo = "0.38.1"

hadris-iso = "1.1.2"
hadris-fat = {version = "1.1.2", features = ["exfat"]} 
hadris-part = "1.1.2"

kanal = "0.1.1"
pelite = "0.10.0"
cms = "0.2.3"
der = { version = "0.7", features = ["alloc", "derive"] } 
sha1 = "0.11"
sha2 = "0.11"

ext4-lwext4 = "0.1.2"

pyo3 = { version = "0.28.3", features = ["extension-module"] }


[target.'cfg(target_os = "linux")'.dependencies]
drives = "0.6.1"


[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort" 
strip = true 

[profile.release-local]   # maturin develop --profile release-local  
inherits = "release"
opt-level = 1 
lto = "off"   
codegen-units = 16 
strip = false
debug = true 
